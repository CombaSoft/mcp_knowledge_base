version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant-kb
    depends_on: 
      - llama-reranker
    ports:
      - "6333:6333"  # HTTP REST API + Web Dashboard
      - "6334:6334"  # gRPC API (используется Spring AI)
    volumes:
      - ./qdrant_storage:/qdrant/storage  # Персистентность данных
    environment:
      # Опционально: если нужно будет использовать API-ключ в будущем
      - QDRANT__SERVICE__API_KEY=${QDRANT_API_KEY:-my-api-key}
    restart: unless-stopped
    
  llama-reranker:
    # Используем актуальный официальный образ
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-reranker-server
    restart: unless-stopped
    
    ports:
      - "8083:8080"
      
    environment:
      - LLAMA_ARG_POOLING=rank
      
    volumes:
      - llama_models:/models:rw
    command: >
      --model /models/bge-reranker-v2-m3-Q8_0.gguf
      --host 0.0.0.0
      --port 8080
      --pooling rank
      --ctx-size 1024
      --batch-size 4096
      --ubatch-size 512
      --reranking
      --embedding 
      --flash-attn on
      
    deploy:
      resources:
        limits:
          memory: 5G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
 
  llama-embedding:
    # Используем актуальный официальный образ
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama-embedding-server
    restart: unless-stopped
    
    ports:
      - "8085:8080"
      
    environment:
      - LLAMA_ARG_POOLING=rank
      
    volumes:
      - llama_models:/models:rw
    command: >
      --model /models/embeddinggemma-300m-qat-Q4_0.gguf
      --host 0.0.0.0
      --port 8080
      --ctx-size 2048
      --batch-size 8192
      --ubatch-size 2048
      --embedding 
      --flash-attn on
      
    deploy:
      resources:
        limits:
          memory: 3G
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s 
 
volumes:
  llama_models: